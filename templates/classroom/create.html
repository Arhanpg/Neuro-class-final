{% extends 'base.html' %}
{% block title %}Create Classroom — NeuroClass{% endblock %}
{% block content %}
<div class="auth-wrapper">
    <div class="auth-card wide-card">
        <div class="auth-header">
            <div class="auth-role-icon instructor-icon">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 5v14M5 12h14"/></svg>
            </div>
            <h2>Create a Classroom</h2>
            <p class="auth-subtitle">A unique code will be generated for your students to join</p>
        </div>

        <form method="POST" class="auth-form">
            <div class="form-group">
                <label for="name">Classroom Name <span class="required">*</span></label>
                <input type="text" id="name" name="name" required placeholder="e.g., Introduction to Machine Learning" maxlength="120">
            </div>

            <div class="form-group">
                <label for="subject">Subject / Course Code</label>
                <input type="text" id="subject" name="subject" placeholder="e.g., CS301, Data Structures" maxlength="80">
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" name="description" rows="3" placeholder="Brief description of this classroom..."></textarea>
            </div>

            <button type="submit" class="btn btn-primary btn-full">Create Classroom &amp; Generate Code</button>
        </form>

        <div class="auth-footer">
            <p><a href="{{ url_for('teacher_dashboard') }}">← Back to Dashboard</a></p>
        </div>
    </div>
</div>
{% endblock %}
