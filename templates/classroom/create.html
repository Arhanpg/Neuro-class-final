{% extends 'base.html' %}
{% block title %}Create Classroom — NeuroClass{% endblock %}
{% block content %}
<div class="page-container page-narrow">
  <div class="page-header">
    <a href="{{ url_for('teacher_dashboard') }}" class="btn btn-ghost btn-sm">← Back</a>
    <h1>Create Classroom</h1>
  </div>
  <div class="form-card">
    <form method="POST" action="{{ url_for('create_classroom') }}">
      <div class="form-group">
        <label for="name">Classroom Name *</label>
        <input type="text" id="name" name="name" placeholder="e.g. Introduction to AI" required>
      </div>
      <div class="form-group">
        <label for="subject">Subject</label>
        <input type="text" id="subject" name="subject" placeholder="e.g. Computer Science">
      </div>
      <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" name="description" rows="3" placeholder="Brief description of the class..."></textarea>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Create Classroom &amp; Generate Code</button>
    </form>
  </div>
</div>
{% endblock %}
