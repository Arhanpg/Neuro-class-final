{% extends 'base.html' %}
{% block title %}Join Classroom — NeuroClass{% endblock %}
{% block content %}
<div class="page-container page-narrow">
  <div class="page-header">
    <a href="{{ url_for('student_dashboard') }}" class="btn btn-ghost btn-sm">← Back</a>
    <h1>Join a Classroom</h1>
  </div>
  <div class="form-card">
    <p class="text-muted" style="margin-bottom:var(--space-6)">Enter the 8-character code shared by your instructor.</p>
    <form method="POST" action="{{ url_for('join_classroom') }}">
      <div class="form-group">
        <label for="code">Classroom Code</label>
        <input type="text" id="code" name="code" placeholder="e.g. AB12CD34"
               style="text-transform:uppercase;letter-spacing:0.1em;font-size:var(--text-lg);text-align:center"
               maxlength="8" required autocomplete="off">
      </div>
      <button type="submit" class="btn btn-primary btn-full">Join Classroom</button>
    </form>
  </div>
</div>
{% endblock %}
