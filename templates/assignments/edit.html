{% extends 'base.html' %}
{% block title %}Edit Assignment{% endblock %}
{% block content %}
<div class="container py-4" style="max-width:860px">
  <div class="d-flex align-items-center gap-3 mb-4">
    <a href="{{ url_for('view_classroom', classroom_id=classroom.id) }}" class="btn btn-outline-secondary btn-sm">← Back</a>
    <h2 class="mb-0">Edit Assignment</h2>
  </div>
  <form method="POST" enctype="multipart/form-data">
    <div class="card mb-4 shadow-sm">
      <div class="card-header fw-semibold">📋 Details</div>
      <div class="card-body">
        <div class="mb-3">
          <label class="form-label">Title</label>
          <input type="text" name="title" class="form-control" value="{{ assignment.title }}" required>
        </div>
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Deadline</label>
            <input type="datetime-local" name="due_date" class="form-control"
              value="{% if assignment.due_date %}{{ assignment.due_date.strftime('%Y-%m-%dT%H:%M') }}{% endif %}">
          </div>
          <div class="col-md-3">
            <label class="form-label">Max Marks</label>
            <input type="number" name="max_marks" class="form-control" value="{{ assignment.max_marks }}">
          </div>
          <div class="col-md-3">
            <label class="form-label">Max Attempts</label>
            <select name="max_attempts" class="form-select">
              {% for i in range(1,6) %}
              <option value="{{ i }}" {% if assignment.max_attempts == i %}selected{% endif %}>{{ i }}</option>
              {% endfor %}
            </select>
          </div>
        </div>
        <div class="mt-3">
          <label class="form-label">Visibility</label>
          <select name="visibility" class="form-select" style="max-width:300px">
            {% for v in ['draft','published','closed'] %}
            <option value="{{ v }}" {% if assignment.visibility == v %}selected{% endif %}>{{ v|capitalize }}</option>
            {% endfor %}
          </select>
        </div>
      </div>
    </div>

    <div class="card mb-4 shadow-sm">
      <div class="card-header fw-semibold">📝 Content</div>
      <div class="card-body">
        <label class="form-label">Assignment Text</label>
        <textarea name="assign_text" class="form-control" rows="8">{{ assignment.assign_text or assignment.description or '' }}</textarea>
        <div class="mt-2">
          <label class="form-label">Or replace with file</label>
          <input type="file" name="assign_file" class="form-control" accept=".pdf,.doc,.docx">
        </div>
      </div>
    </div>

    <div class="card mb-4 shadow-sm">
      <div class="card-header fw-semibold">⚖️ Rubric</div>
      <div class="card-body">
        <textarea name="rubric" class="form-control" rows="6" placeholder="criterion: weight%
Each line: Criterion Name: 30%">{{ assignment.rubric or '' }}</textarea>
      </div>
    </div>

    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary px-5">💾 Save Changes</button>
      <a href="{{ url_for('view_classroom', classroom_id=classroom.id) }}" class="btn btn-outline-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
